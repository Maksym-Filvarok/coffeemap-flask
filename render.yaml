services:
  - type: web
    name: coffeemap
    runtime: docker
    plan: free
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        value: admin123
      - key: DATABASE_URL
        fromDatabase:
          name: coffeemap-db
          property: connectionString

databases:
  - name: coffeemap-db
    plan: free