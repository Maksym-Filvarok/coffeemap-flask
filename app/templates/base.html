<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% block title %}CoffeeMap{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

  <header class="site-header">
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand fw-bold site-logo" href="/">
          CoffeeMap
        </a>

        <div class="site-nav-actions">
          <a href="/" class="btn btn-outline-light btn-sm">Каталог</a>
          <a href="{{ url_for('admin.dashboard') }}" class="btn btn-outline-light btn-sm">Admin</a>
          <a href="/health" class="btn btn-outline-light btn-sm">Health</a>
        </div>
      </div>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="mb-0">
        CoffeeMap — mini catalog of independent coffee shops.
      </p>
    </div>
  </footer>

</body>

</html>
