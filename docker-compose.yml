services:
  web:
    build: .
    container_name: coffeemap_web
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: coffeemap_db
    restart: always
    environment:
      POSTGRES_DB: coffeemap
      POSTGRES_USER: coffeemap
      POSTGRES_PASSWORD: coffeemap_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: