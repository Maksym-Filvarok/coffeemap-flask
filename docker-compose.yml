services:
  web:
    build: .
    container_name: coffeemap_web
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - db
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  db:
    image: postgres:16
    container_name: coffeemap_db
    restart: always
    environment:
      POSTGRES_DB: coffeemap
      POSTGRES_USER: coffeemap
      POSTGRES_PASSWORD: coffeemap_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
